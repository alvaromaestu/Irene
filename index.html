<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Para Irene 💖</title>

  <meta property="og:title" content="Para Irene 💖">
  <meta property="og:description" content="No abras esto si no eres Irene... 💕">

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle, #000000, #0a0a0a);
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      position: absolute;
    }

    .texto {
      position: absolute;
      width: 100%;
      text-align: center;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      transition: 3s;
      z-index: 10;
    }

    h1 {
      font-size: 70px;
      color: #ff4da6;
      text-shadow: 0 0 30px #ff4da6, 0 0 80px #ff4da6;
    }

    /* 💖 TEXTO CORREGIDO AQUÍ */
    p {
      font-size: 36px;
      color: #ffffff;
      text-shadow:
        0 0 5px #000,
        0 0 15px #000,
        0 0 30px #ff4da6,
        0 0 60px #ff4da6;
      font-weight: bold;
    }

    button {
      padding: 15px 30px;
      margin: 20px;
      border: none;
      background: #ff4da6;
      color: white;
      font-size: 20px;
      border-radius: 15px;
      cursor: pointer;
      box-shadow: 0 0 20px #ff4da6;
    }

    #foto {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.5);
      width: 260px;
      height: 260px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 60px #ff4da6;
      opacity: 0;
      transition: 1.5s;
      z-index: 9;
    }
  </style>
</head>

<body>

<canvas id="canvas"></canvas>

<img id="foto" src="foto.jpg">

<div class="texto" id="texto">
  <h1 id="nombre"></h1>
  <p>Te amo por y para siempre 💖</p>

  <div>
    <button onclick="aceptar()">Sí 💘</button>
    <button onmouseover="escapar(this)">No 😢</button>
  </div>
</div>

<audio autoplay loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6f6c9c8d3b.mp3">
</audio>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let t = 0;
let dibujado = false;
let scale = 1;
let growing = true;

function heart(t) {
  return {
    x: 16 * Math.pow(Math.sin(t), 3),
    y: -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))
  };
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.beginPath();

  for (let i = 0; i < t; i += 0.02) {
    let pos = heart(i);
    let size = 45;
    ctx.lineTo(canvas.width/2 + pos.x * size, canvas.height/2 + pos.y * size);
  }

  ctx.strokeStyle = "#ff4da6";
  ctx.shadowColor = "#ff4da6";
  ctx.shadowBlur = 60;
  ctx.lineWidth = 6;
  ctx.stroke();

  if (t < Math.PI * 2) {
    t += 0.04;
  } else {
    dibujado = true;
  }

  if (dibujado) {
    ctx.beginPath();
    for (let i = 0; i < Math.PI * 2; i += 0.02) {
      let pos = heart(i);
      let size = 45 * scale;
      ctx.lineTo(canvas.width/2 + pos.x * size, canvas.height/2 + pos.y * size);
    }
    ctx.stroke();

    if (growing) {
      scale += 0.005;
      if (scale > 1.1) growing = false;
    } else {
      scale -= 0.005;
      if (scale < 0.9) growing = true;
    }

    mostrarTexto();
  }

  requestAnimationFrame(draw);
}

draw();

let textoMostrado = false;

function escribirTexto(texto, elemento, velocidad = 120) {
  let i = 0;
  function escribir() {
    if (i < texto.length) {
      elemento.innerHTML += texto.charAt(i);
      i++;
      setTimeout(escribir, velocidad);
    }
  }
  escribir();
}

function mostrarTexto() {
  if (textoMostrado) return;
  textoMostrado = true;

  document.getElementById("texto").style.opacity = 1;
  escribirTexto("Para Irene 💖", document.getElementById("nombre"));
}

function aceptar() {
  if (navigator.vibrate) {
    navigator.vibrate([200, 100, 200]);
  }

  lanzarCorazones();

  let foto = document.getElementById("foto");
  foto.style.opacity = 1;
  foto.style.transform = "translate(-50%, -50%) scale(1)";
}

function escapar(btn) {
  btn.style.position = "absolute";
  btn.style.top = Math.random() * window.innerHeight + "px";
  btn.style.left = Math.random() * window.innerWidth + "px";
}

function lanzarCorazones() {
  for (let i = 0; i < 40; i++) {
    let heart = document.createElement("div");
    heart.innerHTML = "💖";

    heart.style.position = "absolute";
    heart.style.left = "50%";
    heart.style.top = "50%";
    heart.style.fontSize = (20 + Math.random() * 30) + "px";
    heart.style.zIndex = 20;

    document.body.appendChild(heart);

    let x = (Math.random() - 0.5) * 800;
    let y = (Math.random() - 0.5) * 800;

    heart.animate([
      { transform: "translate(-50%, -50%)", opacity: 1 },
      { transform: `translate(${x}px, ${y}px)`, opacity: 0 }
    ], {
      duration: 1500,
      easing: "ease-out"
    });

    setTimeout(() => heart.remove(), 1500);
  }
}
</script>

</body>
</html>
